<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(22, 27, 40);
        }
        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;    
            align-items: center;
            gap: 10px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
        }
        .heading {
            font-family: 'Courier New', Courier, monospace;
            font-size: 4rem;
            font-weight: 900;
            color: #FFF;
        }
        .clock {
            background-color: rgb(245, 176, 0);
            font-family: 'Courier New', Courier, monospace;
            font-size: 4rem;
            font-weight: 900;
            color: rgb(22, 27, 40);
            padding: 30px 50px;
            border-radius: 30px;
            box-shadow: 0 17px 14px 0 rgba(255, 255, 255, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }
    </style>
</head>
<body>
    <div class="digital_clock">
        <div class="main">
            <div class="heading">Digital Clock</div>
            <div id="clock" class="clock"></div>
        </div>
    </div>
</body>
<script>
    const clock = document.getElementById('clock');

    // console.log('clock ' , date.toLocaleTimeString())
    
    setInterval( () => {
        const date = new Date();
        clock.innerHTML = date.toLocaleTimeString()
    }, 1000)
</script>
</html>
