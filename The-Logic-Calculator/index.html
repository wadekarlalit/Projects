<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS (compiled from SCSS) -->
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>
<body>
    <section>
        <div class="main">
            <!-- Heading -->
            <div>
                <h3>
                    The Logic Calculator
                </h3>
            </div>

            <div class="main_box">
                <div class="calculator">

                    <!-- calculation screen -->
                    <div class="cal_screen">
                        <input type="text" id="cal_input" value="Calculator" />
                    </div>

                    <!-- Calculator Buttons -->
                    <div class="button_box">
                        <div class="button_row">
                            <button id="ac">AC</button>
                            <button id="del">Del</button>
                            <button class="operator" value="%">%</button>
                            <button class="operator" value="/">/</button>
                        </div>
                        <div class="button_row">
                            <button class="number" value="7">7</button>
                            <button class="number" value="8">8</button>
                            <button class="number" value="9">9</button>
                            <button class="operator" value="*">x</button>
                        </div>
                        <div class="button_row">
                            <button class="number" value="4">4</button>
                            <button class="number" value="5">5</button>
                            <button class="number" value="6">6</button>
                            <button class="operator" value="-">-</button>
                        </div>
                        <div class="button_row">
                            <button class="number" value="1">1</button>
                            <button class="number" value="2">2</button>
                            <button class="number" value="3">3</button>
                            <button class="operator" value="+">+</button>
                        </div>
                        <div class="button_row">
                            <button>.</button>
                            <button id="myNumber" class="number" value="0">0</button>
                            <button>()</button>
                            <button id="equals" class="eqal" value="=">=</button>
                        </div>
                    </div>
                </div>

                <!-- Log Screen -->
                <div class="history">
                    <div>
                        <h3>History</h3>
                        <span>icon</span>
                    </div>
                    <div>
                        "8 + 8 = 16"
                    </div>
                </div>
             </div>
        </div>
    </section>

    <!-- JS -->
    <script src="index.js"></script>
</body>
</html>
