<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS (compiled from SCSS) -->
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>
<body>
    <section>
        <div class="main">
            <!-- Heading -->
            <div>
                <h3>
                    The Logic Calculator
                </h3>
            </div>

            <div class="main_box">
                <div class="calculator">

                    <!-- calculation screen -->
                    <div class="cal_screen">
                        <input type="text" id="cal_input" value="Calculator" />
                    </div>

                    <!-- Calculator Buttons -->
                    <div class="button_box">
                        <div class="button_row">
                            <span>AC</span>
                            <span>Del</span>
                            <span>%</span>
                            <span class="operator">/</span>
                        </div>
                        <div class="button_row">
                            <span>7</span>
                            <span>8</span>
                            <span>9</span>
                            <span class="operator">x</span>
                        </div>
                        <div class="button_row">
                            <span>4</span>
                            <span>5</span>
                            <span>6</span>
                            <span class="operator">-</span>
                        </div>
                        <div class="button_row">
                            <button id="btn" value="1">10</button>
                            <span>2</span>
                            <span>3</span>
                            <span class="operator">+</span>
                        </div>
                        <div class="button_row">
                            <span>.</span>
                            <span>0</span>
                            <span>()</span>
                            <span class="operator eqal">=</span>
                        </div>
                    </div>
                </div>

                <!-- Log Screen -->
                <div class="history">
                    <div>
                        <h3>History</h3>
                        <span>icon</span>
                    </div>
                    <div>
                        "8 + 8 = 16"
                    </div>
                </div>
             </div>
        </div>
    </section>

    <!-- JS -->
    <script src="index.js"></script>
</body>
</html>
